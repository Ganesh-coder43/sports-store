<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏏 Sports Store</h1>
</header>

<section class="products">

  <!-- Cricket Bat -->
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Cricket Bat">
    <h2>Premium Cricket Bat</h2>
    <p>₹2,499</p>
    <button onclick="addToCart('Cricket Bat')">Add to Cart</button>
  </div>

  <!-- Jersey -->
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Jersey">
    <h2>Sports Jersey</h2>
    <p>₹999</p>
    <button onclick="addToCart('Jersey')">Add to Cart</button>
  </div>

  <!-- Shoes -->
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Shoes">
    <h2>Running Shoes</h2>
    <p>₹1,799</p>
    <button onclick="addToCart('Shoes')">Add to Cart</button>
  </div>

  <!-- Gloves -->
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Gloves">
    <h2>Batting Gloves</h2>
    <p>₹699</p>
    <button onclick="addToCart('Gloves')">Add to Cart</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
